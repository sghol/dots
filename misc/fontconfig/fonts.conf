<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>

    <!-- Default Sans-Serif -->
    <alias>
        <family>sans-serif</family>
        <prefer>
            <family>Noto Sans</family>
            <family>Vazir</family>
            <family>Noto Color Emoji</family>
        </prefer>
    </alias>

    <!-- Default Serif -->
    <alias>
        <family>serif</family>
        <prefer>
            <family>Noto Serif</family>
            <family>Vazir</family>
            <family>Noto Color Emoji</family>
        </prefer>
    </alias>

    <!-- Default Monospace -->
    <alias>
        <family>monospace</family>
        <prefer>
            <family>Liberation Mono</family>
            <family>Noto Sans Mono</family>
            <family>Noto Color Emoji</family>
        </prefer>
    </alias>

    <!-- Force Vazir for Persian (sans-serif) -->
    <match target="pattern">
        <test name="lang" compare="contains">
            <string>fa</string>
        </test>
        <edit name="family" mode="prepend" binding="strong">
            <string>Vazir</string>
        </edit>
    </match>

    <!-- Prepend Vazir to any font request that will render Arabic script -->
    <match target="pattern">
      <test name="script" compare="eq">
        <string>arabic</string>
      </test>
      <edit name="family" mode="prepend" binding="strong">
        <string>Vazir</string>
      </edit>
    </match>
</fontconfig>
